<!DOCTYPE html>
<html>
<head>
    <title>我的 Web3 網頁</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
    <h1>智慧合約互動</h1>
    <button onclick="connect()">連接 MetaMask</button>
    <p id="status">狀態：尚未連線</p>

    <script>
        let contract;
        let signer;

        async function connect() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // 請求帳號授權
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    signer = provider.getSigner();

                    const address = "0x你的實際合約地址"; // 這裡要改！
                    const abi = [
                        "function setValue(uint256 _value)",
                        "function getValue() view returns (uint256)"
                    ];

                    contract = new ethers.Contract(address, abi, signer);
                    
                    const userAddress = await signer.getAddress();
                    document.getElementById('status').innerText = "已連線至: " + userAddress;
                    alert("錢包連線成功！");
                } catch (error) {
                    console.error(error);
                    alert("連線失敗：" + error.message);
                }
            } else {
                alert("請安裝 MetaMask 擴充功能！");
            }
        }
    </script>
</body>
</html>
